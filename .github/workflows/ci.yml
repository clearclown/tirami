name: Rust Workspace CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check-and-test:
    name: cargo check + cargo test
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install system libraries (llama-cpp, TLS, Bitcoin)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libssl-dev \
            pkg-config \
            cmake \
            clang \
            libclang-dev

      - name: cargo check --workspace
        run: cargo check --workspace

      - name: cargo test --workspace (lib tests only, no model download)
        run: cargo test --workspace --lib --no-fail-fast
        env:
          RUST_LOG: warn

      - name: verify-impl.sh conformance suite
        run: bash scripts/verify-impl.sh

      - name: cargo clippy --workspace (non-blocking for now)
        continue-on-error: true
        run: cargo clippy --workspace -- -D warnings

