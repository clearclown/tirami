name: Publish Crates to crates.io

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip actual publish)'
        type: boolean
        default: true

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish all crates to crates.io
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential libssl-dev pkg-config cmake clang libclang-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo check --workspace
        run: cargo check --workspace

      - name: Publish crates (topological order)
        if: ${{ github.event_name == 'release' || !inputs.dry_run }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -e
          CRATES=(
            tirami-core
            tirami-proto
            tirami-shard
            tirami-infer
            tirami-ledger
            tirami-net
            tirami-bank
            tirami-mind
            tirami-agora
            tirami-lightning
            tirami-sdk
            tirami-node
            tirami-mcp
            tirami-cli
          )
          for crate in "${CRATES[@]}"; do
            echo "::group::Publishing $crate"
            if cargo publish -p "$crate" 2>&1; then
              echo "✅ $crate published"
            else
              echo "⚠️ $crate failed (may already exist or rate limited)"
            fi
            echo "::endgroup::"
            sleep 30  # wait for crates.io index update
          done

      - name: Dry run
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: |
          echo "Dry run — checking publishability"
          cargo publish --dry-run -p tirami-core --allow-dirty 2>&1 | tail -5
          echo "✅ Dry run passed"
